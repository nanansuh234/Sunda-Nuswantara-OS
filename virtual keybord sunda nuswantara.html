<!DOCTYPE html>
<html lang="su">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuswantara OS Keyboard Pro</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #display { width: 90%; max-width: 850px; height: 150px; background: #1e1e1e; color: #76ff03; border: 2px solid #333; border-radius: 12px; padding: 20px; font-size: 1.5rem; margin-bottom: 25px; outline: none; box-shadow: inset 0 0 10px #000; font-family: 'Courier New', monospace; }
        
        #keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; width: 95%; max-width: 900px; background: #252525; padding: 15px; border-radius: 20px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .key { background: #333; border: 1px solid #444; border-radius: 8px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.1s; position: relative; user-select: none; }
        .key:hover { background: #444; border-color: #666; transform: translateY(-2px); }
        .key:active { background: #111; transform: translateY(1px); }
        
        /* Labeling */
        .main-char { display: block; font-size: 1.2rem; font-weight: bold; }
        .shift-char { display: block; font-size: 0.8rem; color: #aaa; position: absolute; top: 4px; left: 6px; }
        .booster-label { font-size: 0.6rem; color: #ffcc80; display: block; margin-top: 2px; }

        /* Color Coding */
        .shift-active { background: #004d40 !important; color: #fff; border-color: #009688 !important; box-shadow: 0 0 10px #009688; }
        .vowel { background: #1a237e; color: #90caf9; }
        .booster { border-left: 3px solid #ffab40; background: #3e2723; }
        .func { background: #b71c1c; color: white; grid-column: span 1; }
        .wide-2 { grid-column: span 2; }
        .space { grid-column: span 5; background: #e0e0e0; color: #222; font-weight: bold; }
        
        #status-bar { width: 90%; max-width: 850px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>Sunda Nuswantara OS v3.0</span>
        <span id="shift-indicator">Shift: OFF</span>
    </div>
    
    <textarea id="display" id="typing-area" placeholder="Seratkeun di dieu..."></textarea>

    <div id="keyboard">
        <div class="key" onclick="k('1','!')"><span class="shift-char">!</span><span class="main-char">1</span></div>
        <div class="key" onclick="k('2','@')"><span class="shift-char">@</span><span class="main-char">2</span></div>
        <div class="key" onclick="k('3','#')"><span class="shift-char">#</span><span class="main-char">3</span></div>
        <div class="key" onclick="k('4','$')"><span class="shift-char">$</span><span class="main-char">4</span></div>
        <div class="key" onclick="k('5','%')"><span class="shift-char">%</span><span class="main-char">5</span></div>
        <div class="key" onclick="k('6','^')"><span class="shift-char">^</span><span class="main-char">6</span></div>
        <div class="key" onclick="k('7','&')"><span class="shift-char">&</span><span class="main-char">7</span></div>
        <div class="key" onclick="k('8','*')"><span class="shift-char">*</span><span class="main-char">8</span></div>
        <div class="key" onclick="k('9','(')"><span class="shift-char">(</span><span class="main-char">9</span></div>
        <div class="key" onclick="k('0',')')"><span class="shift-char">)</span><span class="main-char">0</span></div>

        <div class="key vowel" onclick="k('a','A')"><span class="shift-char">A</span><span class="main-char">a</span></div>
        <div class="key vowel" onclick="k('i','I')"><span class="shift-char">I</span><span class="main-char">i</span></div>
        <div class="key vowel" onclick="k('u','U')"><span class="shift-char">U</span><span class="main-char">u</span></div>
        <div class="key vowel" onclick="k('é','É')"><span class="shift-char">É</span><span class="main-char">é</span></div>
        <div class="key vowel" onclick="k('o','O')"><span class="shift-char">O</span><span class="main-char">o</span></div>
        <div class="key vowel" onclick="k('eu','EU')"><span class="shift-char">EU</span><span class="main-char">eu</span></div>
        <div class="key booster" onclick="k('an','AN')"><span class="shift-char">AN</span><span class="main-char">an</span><span class="booster-label">sfx</span></div>
        <div class="key booster" onclick="k('un','UN')"><span class="shift-char">UN</span><span class="main-char">un</span><span class="booster-label">sfx</span></div>
        <div class="key" onclick="k('p','P')"><span class="shift-char">P</span><span class="main-char">p</span></div>
        <div class="key func" onclick="back()">DEL</div>

        <div class="key booster" onclick="k('ka','KA')"><span class="shift-char">KA</span><span class="main-char">ka</span><span class="booster-label">pfx</span></div>
        <div class="key booster" onclick="k('di','DI')"><span class="shift-char">DI</span><span class="main-char">di</span><span class="booster-label">pfx</span></div>
        <div class="key" onclick="k('s','S')"><span class="shift-char">S</span><span class="main-char">s</span></div>
        <div class="key" onclick="k('d','D')"><span class="shift-char">D</span><span class="main-char">d</span></div>
        <div class="key" onclick="k('k','K')"><span class="shift-char">K</span><span class="main-char">k</span></div>
        <div class="key" onclick="k('l','L')"><span class="shift-char">L</span><span class="main-char">l</span></div>
        <div class="key" onclick="k('m','M')"><span class="shift-char">M</span><span class="main-char">m</span></div>
        <div class="key" onclick="k('n','N')"><span class="shift-char">N</span><span class="main-char">n</span></div>
        <div class="key booster" onclick="k('ng','NG')"><span class="shift-char">NG</span><span class="main-char">ng</span></div>
        <div class="key func" onclick="ent()">ENT</div>

        <div id="shift-btn" class="key wide-2" style="background: #444;" onclick="toggleShift()">SHIFT</div>
        <div class="key booster" onclick="k('ny','NY')"><span class="shift-char">NY</span><span class="main-char">ny</span></div>
        <div class="key booster" onclick="k('ra','RA')"><span class="shift-char">RA</span><span class="main-char">ra</span></div>
        <div class="key booster" onclick="k('na','NA')"><span class="shift-char">NA</span><span class="main-char">na</span></div>
        <div class="key" onclick="k('t','T')"><span class="shift-char">T</span><span class="main-char">t</span></div>
        <div class="key" onclick="k('b','B')"><span class="shift-char">B</span><span class="main-char">b</span></div>
        <div class="key" onclick="k('g','G')"><span class="shift-char">G</span><span class="main-char">g</span></div>
        <div class="key" onclick="k('j','J')"><span class="shift-char">J</span><span class="main-char">j</span></div>
        <div class="key" onclick="k('y','Y')"><span class="shift-char">Y</span><span class="main-char">y</span></div>

        <div class="key" onclick="k('c','C')"><span class="shift-char">C</span><span class="main-char">c</span></div>
        <div class="key" onclick="k('h','H')"><span class="shift-char">H</span><span class="main-char">h</span></div>
        <div class="key space" onclick="k(' ',' ')">SPASI</div>
        <div class="key" onclick="k(',','<')"><span class="shift-char"><</span><span class="main-char">,</span></div>
        <div class="key" onclick="k('.','>')"><span class="shift-char">></span><span class="main-char">.</span></div>
        <div class="key func wide-2" onclick="clr()">RESET</div>
    </div>

    <script>
        const d = document.getElementById('display');
        const sBtn = document.getElementById('shift-btn');
        const sInd = document.getElementById('shift-indicator');
        let isShift = false;

        function toggleShift() {
            isShift = !isShift;
            sBtn.classList.toggle('shift-active');
            sInd.innerText = isShift ? "Shift: ON" : "Shift: OFF";
        }

        function k(normal, shifted) {
            d.value += isShift ? shifted : normal;
            if(isShift) toggleShift(); // Auto-off shift setelah dipake sekali (kayak HP)
            d.scrollTop = d.scrollHeight;
            d.focus();
        }

        function back() { d.value = d.value.slice(0, -1); d.focus(); }
        function clr() { if(confirm('Hapus kabeh?')) d.value = ''; d.focus(); }
        function ent() { d.value += '\n'; d.focus(); }
    </script>
</body>
</html>
